<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice Generator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="text-center mb-4">
    <h1>Invoice Generator</h1>
    <p>Create professional invoices with ease.</p>
    <button id="darkToggle" class="btn btn-outline-light" class = "btn">
      <i class="fa fa-moon"></i> Dark Mode
    </button>
  </div>

  <!-- CUSTOMER INFO -->
  <div class="card-box">
    <div class="section-title">Customer Information</div>

    <div class="mt-3">
      <label>Customer Name</label>
      <input type="text" id="customerName" class="form-control">
      <small class="text-danger d-none" id="nameError">Please enter name</small>
    </div>

    <div class="mt-3">
      <label>Address</label>
      <textarea id="address" class="form-control"></textarea>
    </div>

    <div class="mt-3">
      <label>Contact</label>
      <input type="text" id="contact" class="form-control">
    </div>
  </div>

  <!-- ITEM DETAILS -->
  <div class="card-box">
    <div class="section-title">Item Details</div>

    <table class="table table-bordered mt-3 text-white">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Tax %</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="itemTable"></tbody>
    </table>

    <button id="addItem" class="btn btn-yellow">
      <i class="fa fa-plus"></i> Add Item
    </button>
  </div>

  <!-- CALCULATIONS -->
  <div class="card-box">
    <div class="section-title">Calculations</div>

    <select id="discountType" class="form-control mt-3">
      <option value="percent">Percentage (%)</option>
      <option value="flat">Flat</option>
    </select>

    <input type="number" id="discountValue" class="form-control mt-2" value="0">

    <button id="calculateBtn" class="btn btn-yellow mt-3">Calculate</button>
  </div>

  <!-- PREVIEW -->
  <div class="card-box">
    <div class="section-title">Invoice Preview</div>
    <div id="preview" class="mt-3"></div>
  </div>

  <!-- API DATA -->
  <div class="card-box">
    <div class="d-flex justify-content-between">
      <div class="section-title w-100">API Data</div>
      <button id="refreshAPI" class="btn btn-yellow ms-2">
        Refresh
      </button>
    </div>

    <div class="row mt-3" id="apiData"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
